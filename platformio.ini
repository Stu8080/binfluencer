; Binfluencer — SEEED XIAO-ESP32-S3
; Queries Leeds bin collection API and lights WS2812B LEDs the evening before collection.

[env:seeed_xiao_esp32s3]
platform  = espressif32
board     = seeed_xiao_esp32s3
framework = arduino

monitor_speed = 115200

lib_deps =
    fastled/FastLED @ ~3.9.0
    bblanchon/ArduinoJson @ ^7.0.0
